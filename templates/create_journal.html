{% extends 'base.html' %}

{% block title %}New Entry - MyJournal{% endblock %}

{% block content %}
<div class="editor-container">
    <form method="POST" class="journal-form">
        <div class="editor-header">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">← Back</a>
            <h1>New Journal Entry</h1>
            <button type="submit" class="btn btn-primary">Save Entry</button>
        </div>

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Give your entry a title..." required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="mood">How are you feeling?</label>
                <select id="mood" name="mood">
                    <option value="">Select mood...</option>
                    <option value="😊 Happy">😊 Happy</option>
                    <option value="😌 Calm">😌 Calm</option>
                    <option value="😔 Sad">😔 Sad</option>
                    <option value="😤 Frustrated">😤 Frustrated</option>
                    <option value="😴 Tired">😴 Tired</option>
                    <option value="🤔 Thoughtful">🤔 Thoughtful</option>
                    <option value="😃 Excited">😃 Excited</option>
                    <option value="😰 Anxious">😰 Anxious</option>
                    <option value="🥰 Grateful">🥰 Grateful</option>
                    <option value="😐 Neutral">😐 Neutral</option>
                </select>
            </div>

            <div class="form-group visibility-toggle">
                <label class="toggle-label">
                    <input type="checkbox" name="is_public" id="is_public">
                    <span class="toggle-switch"></span>
                    <span class="toggle-text">Make this entry public</span>
                </label>
                <small>Public entries can be read by anyone</small>
            </div>
        </div>

        <div class="form-group">
            <label for="content">Your thoughts...</label>
            <textarea id="content" name="content" rows="15" placeholder="Write your heart out..." required></textarea>
        </div>
    </form>
</div>
{% endblock %}
